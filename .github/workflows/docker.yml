name: Docker

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

env:
  DOCKERHUB_IMAGE: zerostwo/i-remember.fr

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve Docker tags
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
            primary="${version}"
            tags=("${version}" "latest" "sha-${GITHUB_SHA::12}")
          else
            primary="latest"
            tags=("latest" "sha-${GITHUB_SHA::12}")
          fi
          {
            echo "primary=${primary}"
            echo "tags<<EOF"
            printf "%s\n" "${tags[@]}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"
          echo "TAG=${primary}" >> "${GITHUB_ENV}"

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: zerostwo
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        run: docker build --tag "${DOCKERHUB_IMAGE}:${TAG}" .

      - name: Smoke test image
        shell: bash
        run: |
          set -euo pipefail
          name="i-remember-smoke"
          data_dir="$(mktemp -d)"
          cleanup() {
            docker rm -f "${name}" >/dev/null 2>&1 || true
            rm -rf "${data_dir}"
          }
          trap cleanup EXIT

          docker run -d \
            --name "${name}" \
            -p 7893:7890 \
            -v "${data_dir}:/var/opt/i-remember.fr" \
            "${DOCKERHUB_IMAGE}:${TAG}"

          for _ in $(seq 1 60); do
            if curl -fsS "http://127.0.0.1:7893/healthz" >/dev/null; then
              curl -fsS "http://127.0.0.1:7893/version" >/dev/null
              docker exec "${name}" test -s /var/opt/i-remember.fr/postgres/PG_VERSION
              docker exec "${name}" test -s /var/opt/i-remember.fr/auth-secret
              exit 0
            fi
            if ! docker ps --format "{{.Names}}" | grep -qx "${name}"; then
              docker logs "${name}" || true
              exit 1
            fi
            sleep 2
          done

          docker logs "${name}" || true
          exit 1

      - name: Push image
        shell: bash
        env:
          PRIMARY_TAG: ${{ steps.version.outputs.primary }}
          TAGS: ${{ steps.version.outputs.tags }}
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [[ -n "${tag}" ]] || continue
            if [[ "${tag}" != "${PRIMARY_TAG}" ]]; then
              docker tag "${DOCKERHUB_IMAGE}:${PRIMARY_TAG}" "${DOCKERHUB_IMAGE}:${tag}"
            fi
            docker push "${DOCKERHUB_IMAGE}:${tag}"
          done <<< "${TAGS}"
