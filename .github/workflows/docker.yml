name: Docker

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

env:
  DOCKERHUB_IMAGE: zerostwo/i-remember.fr

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve Docker tags
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          fi
          tags=("${version}" "latest" "sha-${GITHUB_SHA::12}")
          if [[ "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            tags+=("${version%.*}")
          fi
          {
            echo "primary=${version}"
            echo "tags<<EOF"
            printf "%s\n" "${tags[@]}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"
          echo "TAG=${version}" >> "${GITHUB_ENV}"

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: zerostwo
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build single image
        run: docker build --tag "${DOCKERHUB_IMAGE}:${TAG}" .

      - name: Build compose images
        run: docker compose build web admin api

      - name: Push Docker images
        shell: bash
        env:
          PRIMARY_TAG: ${{ steps.version.outputs.primary }}
          TAGS: ${{ steps.version.outputs.tags }}
        run: |
          set -euo pipefail
          images=("${DOCKERHUB_IMAGE}" "${DOCKERHUB_IMAGE}-web" "${DOCKERHUB_IMAGE}-admin" "${DOCKERHUB_IMAGE}-api")
          while IFS= read -r tag; do
            [[ -n "${tag}" ]] || continue
            for image in "${images[@]}"; do
              if [[ "${tag}" != "${PRIMARY_TAG}" ]]; then
                docker tag "${image}:${PRIMARY_TAG}" "${image}:${tag}"
              fi
              docker push "${image}:${tag}"
            done
          done <<< "${TAGS}"
