name: Docker

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

env:
  DOCKERHUB_IMAGE: zerostwo/i-remember.fr

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve version tags
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          fi
          {
            echo "tag=${version}"
            echo "tags<<EOF"
            echo "${DOCKERHUB_IMAGE}:${version}"
            echo "${DOCKERHUB_IMAGE}:latest"
            echo "${DOCKERHUB_IMAGE}:sha-${GITHUB_SHA::12}"
            if [[ "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "${DOCKERHUB_IMAGE}:${version%.*}"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"
          echo "TAG=${version}" >> "${GITHUB_ENV}"

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: zerostwo
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.version.outputs.tags }}
          labels: |
            org.opencontainers.image.title=i-remember.fr
            org.opencontainers.image.version=${{ steps.version.outputs.tag }}
            org.opencontainers.image.revision=${{ github.sha }}
