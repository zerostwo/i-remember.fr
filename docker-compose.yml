services:
  app:
    build:
      context: .
    image: ${DOCKERHUB_IMAGE:-zerostwo/i-remember.fr}:${TAG:-latest}
    ports:
      - "7890:7890"
    environment:
      HOST: 0.0.0.0
      PORT: 7890
      I_REMEMBER_DATA_DIR: /var/opt/i-remember.fr
      I_REMEMBER_AUTO_APPROVE_SUBMISSIONS: ${I_REMEMBER_AUTO_APPROVE_SUBMISSIONS:-true}
      I_REMEMBER_DEFAULT_LANGUAGE: ${I_REMEMBER_DEFAULT_LANGUAGE:-en}
      I_REMEMBER_ANONYMOUS_SUBMISSIONS: ${I_REMEMBER_ANONYMOUS_SUBMISSIONS:-true}
      I_REMEMBER_MAX_UPLOAD_BYTES: ${I_REMEMBER_MAX_UPLOAD_BYTES:-8388608}
      I_REMEMBER_MAX_IMAGE_PIXELS: ${I_REMEMBER_MAX_IMAGE_PIXELS:-30000000}
      I_REMEMBER_SEED_ARCHIVE_DATA: ${I_REMEMBER_SEED_ARCHIVE_DATA:-false}
      I_REMEMBER_SEED_STARTER_CONTENT: ${I_REMEMBER_SEED_STARTER_CONTENT:-false}
      UMAMI_SRC: ${UMAMI_SRC:-}
      UMAMI_WEBSITE_ID: ${UMAMI_WEBSITE_ID:-}
    volumes:
      - i-remember-data:/var/opt/i-remember.fr
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:7890/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  i-remember-data:
